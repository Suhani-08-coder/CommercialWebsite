<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All | Lost Commodities Menswear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link rel="stylesheet" href="HomePage.css">
    <link rel="stylesheet" href="ShopAll.css">
      <link rel="stylesheet" href="Global.css">
</head>
<body class="shop-page">

    <div id="navbar-placeholder"></div>


    <header class="shop-header">
        <div class="container-fluid">
            <h1 class="page-title">MENSWEAR COLLECTION</h1>
            
            <div class="filter-bar">
                <div class="filter-left">
                    <button class="filter-btn active">All</button>
                    <button class="filter-btn">Overshirts</button>
                    <button class="filter-btn">Trousers</button>
                    <button class="filter-btn">Footwear</button>
                    <button class="filter-btn">Accessories</button>
                </div>
                <div class="filter-right">
                    <select class="sort-select">
                        <option>Sort By: Newest</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

  <main class="container-fluid shop-grid-container">
    <div class="row g-4" id="shopGrid">
        
        <div class="col-6 col-md-4 col-lg-3">
            <a href="ProductDetailPage.html?id=suede-leather" class="product-card-link">
                <div class="shop-product-card">
                    <div class="img-container">
                        <img src="./Dress/WhatsApp Image 2026-04-02 at 11.35.12.jpeg" alt="Suede Jacket" class="primary-img">
                        <img src="./Dress/WhatsApp Image 2026-04-02 at 11.35.10 (1).jpeg" alt="Suede Jacket Back" class="secondary-img">
                        <span class="badge-new">Jackets</span>
                    </div>
                    <div class="product-meta">
                        <h4 class="p-name">Suede Leather Jacket</h4>
                        <p class="p-price">₹3,499</p>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-6 col-md-4 col-lg-3">
            <a href="ProductDetailPage.html?id=kimono" class="product-card-link">
                <div class="shop-product-card">
                    <div class="img-container">
                        <img src="./Dress/WhatsApp Image 2026-04-02 at 11.35.11 (1).jpeg" alt="Kimono" class="primary-img">
                        <img src="./Dress/WhatsApp Image 2026-04-02 at 11.35.11.jpeg" alt="Kimono Back" class="secondary-img">
                        <span class="badge-new">Overshirts</span>
                        </div>
                        <div class="product-meta">
                            <h4 class="p-name">Kimono Archive</h4>
                            <p class="p-price">₹11,499</p>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="ProductDetailPage.html?id=Denim" class="product-card-link">
                    <div class="shop-product-card">
                        <div class="img-container">
                            <img src="./Dress/WhatsApp Image 2026-04-03 at 14.46.05.jpeg" alt="Denim Trousers" class="primary-img">
                            <img src="./Dress/WhatsApp Image 2026-04-03 at 14.46.05 (1).jpeg" alt="Denim Detail" class="secondary-img">
                            <span class="badge-new">Trousers</span>
                        </div>
                        <div class="product-meta">
                            <h4 class="p-name">Denim-Hand Stitched</h4>
                            <p class="p-price">₹1,299</p>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="ProductDetailPage.html?id=No-Permission-fit" class="product-card-link">
                    <div class="shop-product-card">
                        <div class="img-container">
                            <img src="./Dress/WhatsApp Image 2026-04-02 at 11.28.21.jpeg" alt="No Permission Fit" class="primary-img">
                            <img src="./Dress/WhatsApp Image 2026-04-03 at 14.46.05 (2).jpeg" alt="Fit View" class="secondary-img">
                            <span class="badge-new">Streetwear</span>
                        </div>
                        <div class="product-meta">
                            <h4 class="p-name">No Permission Fit</h4>
                            <p class="p-price">₹1,499</p>
                        </div>
                    </div>
                </a>
            </div>

        </div>
    </main>
    <div id="footer-placeholder"></div>

    



    <script src="HomePage.js"></script>
    <script src="navbar.js"></script>
    <script src="footer.js"></script> 
</body>
</html>
